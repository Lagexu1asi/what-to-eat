name: Deploy PWA to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发流水线

# 全局权限（必须加，解决OIDC缺失报错）
permissions:
  contents: read # 读取代码
  pages: write # 部署Pages站点
  id-token: write # 关键：开启OIDC令牌，消除当前报错
  actions: write # 删除残留 artifact 所需权限

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 消除Node20弃用警告，用新版Node

      - name: Install dependencies
        run: npm install

      # 修复vite权限报错
      - name: Fix bin execute permission
        run: chmod -R +x node_modules/.bin

      - name: Build Vite project
        run: npm run build

      # 删除当前 run 里可能残留的旧 github-pages artifact
      # 避免 re-run 时 upload-pages-artifact 产生多个同名 artifact 导致 deploy 失败
      - name: Delete stale artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "清理当前 run 残留的 github-pages artifact..."
          ids=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate -q '.artifacts[] | select(.name=="github-pages") | .id' 2>/dev/null || true)
          if [ -z "$ids" ]; then
            echo "无残留 artifact,跳过"
          else
            for id in $ids; do
              echo "删除 artifact id=$id"
              gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done
          fi

      # 上传dist打包产物
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 官方部署Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
