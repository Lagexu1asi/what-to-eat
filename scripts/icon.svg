<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#D8744C"/>
      <stop offset="1" stop-color="#B8542C"/>
    </linearGradient>
  </defs>
  <!-- 背景:赤陶橙渐变圆角方形 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 锅铲整体,左上铲头到右下手柄倾斜 -->
  <g transform="rotate(-45 256 256)">
    <!-- 铲头:带圆角的扁方形 -->
    <rect x="146" y="126" width="168" height="128" rx="28" fill="#FFFDF9"/>
    <!-- 铲面三条漏槽 -->
    <g stroke="#C8643C" stroke-width="11" stroke-linecap="round" opacity="0.5">
      <line x1="176" y1="166" x2="284" y2="166"/>
      <line x1="176" y1="196" x2="284" y2="196"/>
      <line x1="176" y1="226" x2="284" y2="226"/>
    </g>
    <!-- 手柄 -->
    <rect x="222" y="254" width="44" height="172" rx="22" fill="#FFFDF9"/>
    <!-- 手柄末端挂孔 -->
    <circle cx="244" cy="432" r="34" fill="#FFFDF9"/>
    <circle cx="244" cy="432" r="14" fill="url(#bg)"/>
  </g>
</svg>
